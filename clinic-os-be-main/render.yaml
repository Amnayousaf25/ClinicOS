# Render service configuration for the Hourlli backend.
# https://render.com/docs/blueprint-spec
#
# Key points:
# - `dist/` is committed to git and regenerated by a pre-push husky hook, so
#   Render never compiles TypeScript itself. The build step here only installs
#   runtime dependencies.
# - Start runs the pre-built bundle via `node dist/main` directly. Do NOT use
#   `yarn start` (nest start) — it recompiles TS on boot and OOMs on the
#   starter plan.
# - Node is pinned to 25.9.0 (matches .nvmrc).
# - Secrets (JWT, Mongo URI, AWS, OpenAI) must be set in the Render dashboard
#   as environment variables; they are intentionally not committed here.

services:
  - type: web
    name: hourlli-api
    runtime: node
    plan: starter
    region: oregon
    branch: main
    rootDir: .
    buildCommand: yarn install --frozen-lockfile --production=false
    startCommand: node dist/main
    healthCheckPath: /api/v1
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 25.9.0
      - key: NODE_ENV
        value: prod
      - key: PORT
        value: 4005
      # ── Secrets — set these in the Render dashboard, not here ──
      - key: MONGODB_URI
        sync: false
      - key: EXTERNAL_MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_CLOUDFRONT_DOMAIN
        sync: false
