# Render service configuration for the ClinicOS backend.
# https://render.com/docs/blueprint-spec
#
# Key points:
# - dist/ is pre-built; Render only installs runtime dependencies.
# - Start runs the pre-built bundle via `node dist/main` directly.
# - Secrets (JWT, Mongo URI, AWS) must be set in the Render dashboard.

services:
  - type: web
    name: clinicos-api
    runtime: node
    plan: starter
    region: oregon
    branch: main
    rootDir: .
    buildCommand: yarn install --frozen-lockfile --production=false
    startCommand: node dist/main
    healthCheckPath: /api/v1
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 24.18.0
      - key: NODE_ENV
        value: prod
      - key: PORT
        value: 4002
      # CORS — comma-separated list of allowed frontend origins
      - key: ALLOWED_ORIGINS
        value: https://clinic-stride-aid.vercel.app,http://localhost:8080,http://localhost:8082
      # Frontend URL used in invitation emails and intake form SMS links
      - key: FRONTEND_URL
        value: https://clinic-stride-aid.vercel.app
      # ── Secrets — set these in the Render dashboard, not here ──
      - key: MONGODB_URI
        sync: false
      - key: EXTERNAL_MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 2h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_CLOUDFRONT_DOMAIN
        sync: false
